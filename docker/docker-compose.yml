name: kindergarden

services:
  mysql:
    image: mysql:8.0
    container_name: kindergarden_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in docker/.env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set MYSQL_DATABASE in docker/.env}
      MYSQL_USER: ${MYSQL_USER:?set MYSQL_USER in docker/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in docker/.env}
      TZ: Asia/Seoul
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${MYSQL_PUBLISHED_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: kindergarden_redis
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - erp-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  erp-network:
    driver: bridge
