services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kindergarden_prometheus
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${PROMETHEUS_PUBLISHED_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - erp-network

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: kindergarden_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${GRAFANA_PUBLISHED_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER in docker/.env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in docker/.env}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - erp-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
