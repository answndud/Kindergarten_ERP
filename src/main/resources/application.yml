# ===========================================
# 공통 설정 (모든 환경에서 적용)
# ===========================================

spring:
  application:
    name: erp

  profiles:
    group:
      demo:
        - local

  # JPA 설정
  jpa:
    open-in-view: false  # OSIV 비활성화 (성능 최적화)
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100  # N+1 문제 완화

  # Flyway 설정
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 900000      # 15분 (밀리초)
  refresh-token-validity: 604800000  # 7일 (밀리초)
  cookie-secure: true
  cookie-same-site: Strict

# 서버 설정
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# 로깅 설정
logging:
  level:
    root: INFO
    com.erp: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,criticalDependencies
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: false

info:
  app:
    name: ${spring.application.name}
    description: Kindergarten ERP backend portfolio project
    version: 0.0.1-SNAPSHOT

# 알림 발송 설정 (외부 채널은 선택 사항)
notification:
  delivery:
    batch-size: 500
    worker-enabled: true
    worker-fixed-delay-ms: 15000
    worker-batch-size: 100
    max-attempts: 5
    initial-retry-delay: 30s
    max-retry-delay: 15m
    retry-backoff-multiplier: 2.0
    processing-timeout: 5m
    connect-timeout: 3s
    read-timeout: 5s
    external-types:
      - AUTH_ANOMALY_DETECTED
    incident-types:
      - AUTH_ANOMALY_DETECTED
    email:
      enabled: false
      from: ${NOTIFICATION_EMAIL_FROM:no-reply@kindercare.local}
      subject-prefix: "[KinderCare]"
    push:
      enabled: false
      webhook-url: ${NOTIFICATION_PUSH_WEBHOOK:}
    app:
      enabled: false
      webhook-url: ${NOTIFICATION_APP_WEBHOOK:}
    incident-webhook:
      enabled: false
      webhook-url: ${NOTIFICATION_INCIDENT_WEBHOOK:}

app:
  seed:
    enabled: false
    log-credentials: false
  security:
    management-surface:
      public-api-docs: false
      expose-prometheus-on-app-port: false
    client-ip:
      trusted-proxies: []
    auth-alert:
      enabled: true
      login-failure-threshold: 3
      login-failure-window: 10m
      alert-cooldown: 30m
    auth-audit-retention:
      enabled: true
      archive-after: 30d
      delete-after: 365d
      cron: "0 30 3 * * *"
      batch-size: 500

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
