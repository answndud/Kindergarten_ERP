<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출결관리 - 유치원 ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#F3FBF7',
                            100: '#E2F5EB',
                            200: '#C7EBD9',
                            300: '#A4DEC2',
                            400: '#79CCA5',
                            500: '#56B88C',
                            600: '#3F9C73',
                            700: '#327D5E',
                            800: '#26624A',
                            900: '#1D4D3A',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
    <link rel="stylesheet" th:href="@{/css/custom.css}" href="/css/custom.css">
</head>
<body class="bg-gray-50">

<header th:replace="~{fragments/header :: header}"></header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
        <!-- Page Header -->
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">출결관리</h1>
                <p class="text-gray-600">원생들의 출석 현황을 관리하세요</p>
            </div>
            <div class="grid w-full gap-2 sm:w-auto sm:grid-flow-col sm:auto-cols-max">
                <a href="/attendance-requests" class="inline-flex min-h-11 items-center justify-center px-4 py-2 border border-primary-200 rounded-lg text-sm font-medium text-primary-700 hover:bg-primary-50 transition-colors">
                    출결 변경 요청
                </a>
                <a href="/attendance/monthly" class="inline-flex min-h-11 items-center justify-center px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:text-primary-600 hover:border-primary-200 transition-colors">
                    월간 리포트 보기
                </a>
            </div>
        </div>

        <section class="mb-6 rounded-xl border border-gray-200 bg-white/95 p-4 sm:p-5">
            <div class="grid gap-4 lg:grid-cols-[minmax(0,1fr)_minmax(220px,320px)_auto] lg:items-end" x-data="classroomLoader()" x-init="init()">
                <div>
                    <label for="selectedDate" class="block text-sm font-semibold text-gray-800 mb-2">출결 날짜</label>
                    <div class="grid grid-cols-[44px_minmax(0,1fr)_44px] items-center gap-2">
                        <button id="prevDay" type="button" aria-label="이전 날짜" class="flex h-11 w-11 items-center justify-center hover:bg-gray-100 rounded-lg transition-colors">
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <input type="date" id="selectedDate" class="h-11 w-full px-4 border border-gray-200 rounded-lg text-center font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <button id="nextDay" type="button" aria-label="다음 날짜" class="flex h-11 w-11 items-center justify-center hover:bg-gray-100 rounded-lg transition-colors">
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="classroomFilter" class="block text-sm font-semibold text-gray-800 mb-2">반</label>
                    <select id="classroomFilter" class="h-11 w-full px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" x-on:change="loadAttendance()">
                        <option value="">반을 선택하세요</option>
                        <template x-for="classroom in classrooms" :key="classroom.id">
                            <option :value="classroom.id" x-text="classroom.name"></option>
                        </template>
                    </select>
                </div>

                <div id="quickActions" class="hidden">
                    <p class="mb-2 text-sm font-semibold text-gray-800">빠른 등록</p>
                    <div class="grid grid-cols-2 gap-2 lg:flex">
                        <button type="button" onclick="showBulkModal('present')" class="min-h-11 px-4 py-2 bg-green-100 text-green-700 rounded-lg text-sm font-semibold hover:bg-green-200 transition-colors">
                            전체 출석
                        </button>
                        <button type="button" onclick="showBulkModal('absent')" class="min-h-11 px-4 py-2 bg-red-100 text-red-700 rounded-lg text-sm font-semibold hover:bg-red-200 transition-colors">
                            전체 결석
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Attendance List -->
        <div id="attendance-list" class="lg:bg-white lg:rounded-xl lg:border lg:border-gray-200 lg:overflow-hidden">
            <!-- Desktop Table View -->
            <table class="hidden lg:table w-full">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase">원생</th>
                        <th class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase">상태</th>
                        <th class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase">등원 시간</th>
                        <th class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase">하원 시간</th>
                        <th class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase">사유</th>
                        <th class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase">작업</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">반을 선택하세요</td>
                    </tr>
                </tbody>
            </table>

            <!-- Mobile Card View -->
            <div id="attendanceMobile" class="lg:hidden space-y-3">
                <div class="rounded-xl border border-gray-200 bg-white px-5 py-8 text-center text-sm text-gray-500">반을 선택하면 오늘 출결을 바로 기록할 수 있습니다.</div>
            </div>
        </div>
    </main>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom JS (UI helpers) -->
    <script th:src="@{/js/app.js}"></script>
 
    <script>
        function classroomLoader() {
            return {
                classrooms: [],
                async init() {
                    try {
                        const res = await fetch('/api/v1/members/me', { credentials: 'same-origin' });
                        if (!res.ok) return;
                        const me = await res.json().catch(() => ({}));
                        if (!me.success || !me.data) return;
                        const kindergartenId = me.data.kindergartenId;
                        if (!kindergartenId) return;

                        const classroomsRes = await fetch(`/api/v1/classrooms?kindergartenId=${kindergartenId}`, { credentials: 'same-origin' });
                        if (classroomsRes.ok) {
                            const d = await classroomsRes.json().catch(() => ({}));
                            this.classrooms = Array.isArray(d.data) ? d.data : (d.data?.content || []);

                            if (this.classrooms.length > 0) {
                                requestAnimationFrame(() => {
                                    const select = document.getElementById('classroomFilter');
                                    if (select && !select.value) {
                                        select.value = String(this.classrooms[0].id);
                                        if (typeof loadAttendance === 'function') {
                                            loadAttendance();
                                        }
                                    }
                                });
                            }
                        }
                    } catch (e) {
                        console.error('Error loading classrooms:', e);
                    }
                }
            };
        }

        let loadAttendance = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Show quick actions for Principal/Teacher
            const userRole = '[[${currentMember?.role?.name}]]';
            if (userRole === 'PRINCIPAL' || userRole === 'TEACHER') {
                document.getElementById('quickActions').classList.remove('hidden');
            }

            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('selectedDate').value = today;

            // Date navigation
            document.getElementById('prevDay').addEventListener('click', function() {
                const dateInput = document.getElementById('selectedDate');
                const currentDate = new Date(dateInput.value);
                currentDate.setDate(currentDate.getDate() - 1);
                dateInput.value = currentDate.toISOString().split('T')[0];
                loadAttendance();
            });

            document.getElementById('nextDay').addEventListener('click', function() {
                const dateInput = document.getElementById('selectedDate');
                const currentDate = new Date(dateInput.value);
                currentDate.setDate(currentDate.getDate() + 1);
                dateInput.value = currentDate.toISOString().split('T')[0];
                loadAttendance();
            });

            document.getElementById('selectedDate').addEventListener('change', function() {
                loadAttendance();
            });

            document.getElementById('classroomFilter').addEventListener('change', function() {
                loadAttendance();
            });

            // Load attendance via API
            loadAttendance = async function() {
                const date = document.getElementById('selectedDate').value;
                const classroomId = document.getElementById('classroomFilter').value;
                const tbody = document.getElementById('attendanceBody');
                const mobileTbody = document.getElementById('attendanceMobile');

                if (!classroomId) {
                    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">반을 선택하면 출결 목록이 표시됩니다.</td></tr>';
                    if (mobileTbody) {
                        mobileTbody.innerHTML = '<div class="rounded-xl border border-gray-200 bg-white px-5 py-8 text-center text-sm text-gray-500">반을 선택하면 오늘 출결을 바로 기록할 수 있습니다.</div>';
                    }
                    return;
                }

                let rows = [];

                try {
                    const response = await fetch(`/api/v1/attendance/daily?date=${date}&classroomId=${classroomId}`, {
                        credentials: 'same-origin'
                    });
                    const data = await response.json().catch(() => ({}));
                    rows = Array.isArray(data.data) ? data.data : [];

                    if (!data.success || rows.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">선택한 반에 표시할 출결 대상이 없습니다.</td></tr>';
                        if (mobileTbody) {
                            mobileTbody.innerHTML = '<div class="rounded-xl border border-gray-200 bg-white px-5 py-8 text-center text-sm text-gray-500">선택한 반에 표시할 출결 대상이 없습니다.</div>';
                        }
                        return;
                    }

                    tbody.innerHTML = rows.map(row => {
                        const statusMap = {
                            PRESENT: '출석',
                            ABSENT: '결석',
                            LATE: '지각',
                            EARLY_LEAVE: '조퇴',
                            SICK_LEAVE: '병결'
                        };
                        const selectedStatus = row.status || 'PRESENT';
                        const statusOptions = Object.entries(statusMap)
                            .map(([value, label]) => `<option value="${value}" ${selectedStatus === value ? 'selected' : ''}>${label}</option>`)
                            .join('');

                        const dropOffTime = row.dropOffTime || '';
                        const pickUpTime = row.pickUpTime || '';
                        const note = row.note || '';
                        const safeKidName = escapeHtml(row.kidName || '이름 없음');
                        const safeNote = escapeHtml(note);
                        const kidInitial = safeKidName ? safeKidName.charAt(0) : '?';

                        return `
                            <tr class="hover:bg-gray-50 lg:table-row" data-attendance-row="${row.kidId}">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-primary-100 rounded-full flex items-center justify-center">
                                            <span class="text-sm font-semibold text-primary-700">${kidInitial}</span>
                                        </div>
                                        <div>
                                            <p class="font-medium text-gray-900">${safeKidName}</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <select class="attendance-status h-10 px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}">
                                        ${statusOptions}
                                    </select>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <input type="time" class="drop-off-time h-10 px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}" value="${dropOffTime}">
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <input type="time" class="pick-up-time h-10 px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}" value="${pickUpTime}">
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <input type="text" class="attendance-note h-10 w-44 px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}" placeholder="메모" value="${safeNote}">
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <button type="button" onclick="saveAttendance(${row.kidId}, this)" class="min-h-10 px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-semibold hover:bg-primary-700 transition-colors">
                                        저장
                                    </button>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } catch (error) {
                    console.error('Error loading attendance:', error);
                    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-red-600">출결 목록을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</td></tr>';
                    if (mobileTbody) {
                        mobileTbody.innerHTML = '<div class="rounded-xl border border-red-200 bg-red-50 px-5 py-8 text-center text-sm text-red-700">출결 목록을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</div>';
                    }
                    return;
                }

                if (mobileTbody) {
                    mobileTbody.innerHTML = rows.map(row => {
                        const statusMap = {
                            PRESENT: '출석',
                            ABSENT: '결석',
                            LATE: '지각',
                            EARLY_LEAVE: '조퇴',
                            SICK_LEAVE: '병결'
                        };
                        const selectedStatus = row.status || 'PRESENT';
                        const statusOptions = Object.entries(statusMap)
                            .map(([value, label]) => `<option value="${value}" ${selectedStatus === value ? 'selected' : ''}>${label}</option>`)
                            .join('');

                        const dropOffTime = row.dropOffTime || '';
                        const pickUpTime = row.pickUpTime || '';
                        const note = row.note || '';
                        const safeKidName = escapeHtml(row.kidName || '이름 없음');
                        const safeNote = escapeHtml(note);
                        const kidInitial = safeKidName ? safeKidName.charAt(0) : '?';

                        return `
                            <div class="rounded-xl border border-gray-200 bg-white p-4" data-attendance-row="${row.kidId}">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-12 h-12 bg-primary-100 rounded-full flex items-center justify-center">
                                        <span class="text-sm font-semibold text-primary-700">${kidInitial}</span>
                                    </div>
                                    <div>
                                        <p class="font-semibold text-gray-900">${safeKidName}</p>
                                        <p class="text-sm text-gray-500">오늘 출결 상태를 확인해 주세요.</p>
                                    </div>
                                </div>
                                <div class="grid gap-3 sm:grid-cols-2">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-700 mb-2">상태</label>
                                        <select class="attendance-status h-11 w-full px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}">
                                            ${statusOptions}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-700 mb-2">등원 시간</label>
                                        <input type="time" class="drop-off-time h-11 w-full px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}" value="${dropOffTime}">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-700 mb-2">하원 시간</label>
                                        <input type="time" class="pick-up-time h-11 w-full px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}" value="${pickUpTime}">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-700 mb-2">메모</label>
                                        <input type="text" class="attendance-note h-11 w-full px-3 border border-gray-200 rounded-lg text-sm" data-kid-id="${row.kidId}" placeholder="결석/지각 사유" value="${safeNote}">
                                    </div>
                                </div>
                                <button type="button" onclick="saveAttendance(${row.kidId}, this)" class="mt-4 min-h-11 w-full px-4 py-3 bg-primary-600 text-white rounded-lg text-sm font-semibold hover:bg-primary-700 transition-colors">
                                    저장
                                </button>
                            </div>
                        `;
                    }).join('');
                }
            };
        });

        async function showBulkModal(type) {
            const date = document.getElementById('selectedDate').value;
            const classroomId = document.getElementById('classroomFilter').value;

            if (!classroomId) {
                await UI.alert({
                    title: '반 선택 필요',
                    text: '일괄 변경하려면 먼저 반을 선택해 주세요.',
                    icon: 'warning'
                });
                return;
            }

            const typeLabels = {
                present: '전체 출석',
                absent: '전체 결석'
            };
            const statusMap = {
                present: 'PRESENT',
                absent: 'ABSENT'
            };

            let note = '';
            if (type === 'absent') {
                const result = await UI.promptTextarea({
                    title: '결석 사유',
                    label: '결석 사유를 입력해 주세요',
                    placeholder: '예) 개인 사정, 병결 등',
                    confirmText: '적용',
                    cancelText: '취소'
                });
                if (!result.isConfirmed) return;
                note = result.value || '';
            } else {
                const ok = await UI.confirm({
                    title: typeLabels[type],
                    text: `${date}에 모든 원생의 출석을 ${typeLabels[type].replace('전체 ', '')} 처리하시겠습니까?`,
                    confirmText: '확인',
                    cancelText: '취소',
                    icon: 'question'
                });
                if (!ok) return;
            }

            try {
                const status = statusMap[type];
                const response = await fetch('/api/v1/attendance/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        classroomId: Number(classroomId),
                        date: date,
                        status: status,
                        note: note || null
                    })
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    await UI.error(error.message || '일괄 처리에 실패했습니다.');
                    return;
                }

                await UI.success(`${typeLabels[type]}이 완료되었습니다.`);
                loadAttendance();
            } catch (error) {
                console.error('Error:', error);
                await UI.error(error.message || '요청 처리 중 오류가 발생했습니다.');
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        async function saveAttendance(kidId, trigger) {
            const date = document.getElementById('selectedDate').value;
            const scope = trigger?.closest('[data-attendance-row]') || document.querySelector(`[data-attendance-row="${kidId}"]`);
            if (!scope) {
                await UI.error('저장할 출결 행을 찾지 못했습니다. 화면을 새로고침한 뒤 다시 시도해 주세요.');
                return;
            }

            const status = scope.querySelector('.attendance-status').value;
            const dropOffTime = scope.querySelector('.drop-off-time').value;
            const pickUpTime = scope.querySelector('.pick-up-time').value;
            const note = scope.querySelector('.attendance-note').value;

            const data = {
                kidId: kidId,
                date: date,
                status: status,
                dropOffTime: dropOffTime || null,
                pickUpTime: pickUpTime || null,
                note: note || null
            };

            try {
                const response = await fetch('/api/v1/attendance/upsert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    await UI.success('출결 정보를 저장했습니다.');
                } else {
                    const error = await response.json().catch(() => ({}));
                    await UI.error(error.message || '저장에 실패했습니다.');
                }
            } catch (error) {
                console.error('Error:', error);
                await UI.error(error.message || '요청 처리 중 오류가 발생했습니다.');
            }
        }
    </script>
</body>
</html>
