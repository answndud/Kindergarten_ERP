<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유치원 등록 - 유치원 ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
    <link rel="stylesheet" th:href="@{/css/custom.css}" href="/css/custom.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0">
                    <a href="/" class="flex items-center gap-2">
                        <div class="w-10 h-10 bg-emerald-700 rounded-xl flex items-center justify-center">
                            <img th:src="@{/img/logo.svg}" src="/img/logo.svg" alt="KinderCare" class="w-full h-full object-contain" />
                        </div>
                        <span class="sr-only">KinderCare</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
        <div class="mb-6">
            <p class="text-sm font-semibold text-primary-700">Principal Setup</p>
            <h1 class="mt-2 text-3xl font-bold text-gray-900">유치원 등록</h1>
            <p class="mt-2 max-w-2xl text-gray-600">운영을 시작할 유치원의 기본 정보를 입력해 주세요.</p>
        </div>

        <div class="rounded-xl border border-gray-200 bg-white p-5 sm:p-6">
            <form id="kindergartenForm" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">유치원 이름 *</label>
                    <input type="text" name="name" id="name" required
                           class="h-11 w-full px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600"
                           placeholder="예: 해송유치원">
                </div>

                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700 mb-2">주소 *</label>
                    <input type="text" name="address" id="address" required
                           class="h-11 w-full px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600"
                           placeholder="예: 서울시 강남구 테헤란로 123">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">전화번호 *</label>
                    <input type="tel" name="phone" id="phone" required
                           class="h-11 w-full px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600"
                           placeholder="예: 02-1234-5678">
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="openTime" class="block text-sm font-medium text-gray-700 mb-2">개관 시간</label>
                        <input type="time" name="openTime" id="openTime" value="08:00"
                               class="h-11 w-full px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                    </div>
                    <div>
                        <label for="closeTime" class="block text-sm font-medium text-gray-700 mb-2">폐관 시간</label>
                        <input type="time" name="closeTime" id="closeTime" value="19:00"
                               class="h-11 w-full px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="min-h-12 w-full rounded-lg bg-emerald-700 px-6 py-3 font-semibold text-white transition-colors hover:bg-emerald-800">
                        유치원 등록하기
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom JS (UI helpers) -->
    <script th:src="@{/js/app.js}"></script>

    <script>
        document.getElementById('kindergartenForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                openTime: document.getElementById('openTime').value,
                closeTime: document.getElementById('closeTime').value
            };

            try {
                const response = await fetch('/api/v1/kindergartens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    await UI.success('유치원 등록이 완료되었습니다.');
                    window.location.href = '/';
                } else {
                    await UI.error(result.message || '유치원 등록에 실패했습니다.');
                }
            } catch (error) {
                console.error('Error:', error);
                await UI.error(error.message || '요청 처리 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
