<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 - 유치원 ERP</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#F3FBF7',
                            100: '#E2F5EB',
                            200: '#C7EBD9',
                            300: '#A4DEC2',
                            400: '#79CCA5',
                            500: '#56B88C',
                            600: '#3F9C73',
                            700: '#327D5E',
                            800: '#26624A',
                            900: '#1D4D3A',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" th:href="@{/css/custom.css}" href="/css/custom.css">
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header th:replace="~{fragments/header :: header}"></header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <p class="text-sm font-semibold text-primary-700">Account</p>
            <h1 class="mt-2 text-3xl font-bold text-gray-900">프로필</h1>
            <p class="mt-3 text-gray-600">이름, 연락처, 역할 정보를 확인하고 필요한 항목만 수정하세요.</p>
        </div>

        <!-- Profile Card -->
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
            <!-- Profile Header -->
            <div class="border-b border-gray-200 bg-white px-6 py-6">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 rounded-full border border-primary-200 bg-primary-50 flex items-center justify-center">
                        <span class="text-2xl font-bold text-primary-700" th:text="${#strings.toUpperCase(#strings.substring(currentMember?.name ?: 'U', 0, 1))}">U</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-900" th:text="${currentMember?.name}">사용자명</h2>
                        <p class="mt-1 text-sm text-gray-600" th:text="${currentMember?.email}">user@example.com</p>
                        <span class="inline-flex mt-3 items-center rounded-full bg-primary-50 px-3 py-1 text-sm font-medium text-primary-700" th:text="${currentMember?.role?.title}">역할</span>
                    </div>
                </div>
            </div>

            <!-- Profile Info -->
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm font-medium text-gray-500">이름</label>
                        <p class="font-medium text-gray-900" th:text="${currentMember?.name}">-</p>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500">역할</label>
                        <p class="font-medium text-gray-900" th:text="${currentMember?.role?.title}">-</p>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500">이메일</label>
                        <p class="font-medium text-gray-900" th:text="${currentMember?.email}">-</p>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-500">전화번호</label>
                        <p class="font-medium text-gray-900" th:text="${currentMember?.phone}">-</p>
                    </div>
                </div>

                <div class="border-t border-gray-200 pt-4 mt-4">
                    <div>
                        <label class="text-sm font-medium text-gray-500">가입일</label>
                        <p class="font-medium text-gray-900" th:text="${#temporals.format(currentMember?.createdAt, 'yyyy-MM-dd')}">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-3 sm:flex-row">
            <button onclick="editProfile()" class="inline-flex min-h-11 flex-1 items-center justify-center rounded-lg bg-primary-600 px-4 text-sm font-semibold text-white transition-colors hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2">
                프로필 수정
            </button>
            <button onclick="location.href='/settings'" class="inline-flex min-h-11 items-center justify-center rounded-lg border border-gray-200 bg-white px-4 text-sm font-semibold text-gray-700 transition-colors hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2">
                설정
            </button>
        </div>
    </main>


    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom JS (UI/Notifications) -->
    <script th:src="@{/js/app.js}"></script>

    <script th:inline="javascript">
        async function editProfile() {
            const currentName = /*[[${currentMember?.name}]]*/ '';
            const currentPhone = /*[[${currentMember?.phone}]]*/ '';

            const result = await Swal.fire({
                title: '프로필 수정',
                html: `
                    <div class="text-left space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">이름 *</label>
                            <input id="swal-name" class="h-11 w-full px-3 border border-gray-200 rounded-lg" value="${(currentName || '').replaceAll('"', '&quot;')}" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">전화번호 (선택)</label>
                            <input id="swal-phone" class="h-11 w-full px-3 border border-gray-200 rounded-lg" value="${(currentPhone || '').replaceAll('"', '&quot;')}" placeholder="예) 01012345678" />
                        </div>
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: '저장',
                cancelButtonText: '취소',
                customClass: {
                    popup: 'rounded-xl',
                    confirmButton: 'min-h-10 px-4 rounded-lg bg-primary-600 text-white font-medium',
                    cancelButton: 'min-h-10 px-4 rounded-lg bg-gray-100 text-gray-700 font-medium',
                },
                buttonsStyling: false,
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value;
                    const phone = document.getElementById('swal-phone').value;

                    if (!name || name.trim() === '') {
                        Swal.showValidationMessage('이름을 입력해 주세요.');
                        return false;
                    }

                    return {
                        name: name.trim(),
                        phone: phone && phone.trim() !== '' ? phone.trim() : null
                    };
                }
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch('/api/v1/members/profile', {
                    method: 'PATCH',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(result.value)
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(payload.message || '수정 중 오류가 발생했습니다.');
                }

                await UI.success('프로필을 수정했습니다.');
                location.reload();
            } catch (e) {
                await UI.error(e.message);
            }
        }
    </script>
</body>
</html>
