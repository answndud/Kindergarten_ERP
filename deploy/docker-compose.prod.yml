services:
  app:
    image: ${APP_IMAGE:?set APP_IMAGE}
    container_name: kindergarten-erp-app
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9091:9091"
    depends_on:
      - redis
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: kindergarten-erp-redis
    restart: unless-stopped
    command: sh -c "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD"
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - erp-network

  caddy:
    image: caddy:2
    container_name: kindergarten-erp-caddy
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - erp-network

volumes:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  erp-network:
    driver: bridge
