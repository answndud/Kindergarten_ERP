name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run fast test suite
        run: ./gradlew --no-daemon fastTest

      - name: Upload fast test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: fast-test-reports
          path: |
            build/reports/tests/fastTest
            build/test-results/fastTest
          if-no-files-found: ignore

  integration-tests:
    name: Integration Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: fast-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Verify Docker availability
        run: docker version

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run integration test suite
        run: ./gradlew --no-daemon integrationTest

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-reports
          path: |
            build/reports/tests/integrationTest
            build/test-results/integrationTest
          if-no-files-found: ignore

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fast-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Verify Docker availability
        run: docker version

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build bootJar artifact
        run: ./gradlew --no-daemon bootJar

      - name: Verify bootJar contents
        run: |
          JAR_PATH="$(ls build/libs/*.jar | head -n 1)"
          test -n "$JAR_PATH"
          jar tf "$JAR_PATH" | grep 'BOOT-INF/classes'

      - name: Resolve compose configs
        run: |
          docker compose --env-file docker/.env.example -f docker/docker-compose.yml config >/tmp/docker-compose.base.yml
          docker compose --env-file docker/.env.example -f docker/docker-compose.yml -f docker/docker-compose.monitoring.yml config >/tmp/docker-compose.monitoring.yml

      - name: Upload bootJar artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bootjar-artifact
          path: build/libs/*.jar
          if-no-files-found: error

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: fast-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Verify Docker availability
        run: docker version

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run performance smoke suite
        run: ./gradlew --no-daemon performanceSmokeTest

      - name: Upload performance smoke reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-smoke-reports
          path: |
            build/reports/tests/performanceSmokeTest
            build/test-results/performanceSmokeTest
          if-no-files-found: ignore
